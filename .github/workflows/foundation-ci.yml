name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore API
        run: dotnet restore apps/api/SMA.Api/SMA.Api.csproj
      - name: Build API
        run: dotnet build apps/api/SMA.Api/SMA.Api.csproj --configuration Release --no-restore

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install web dependencies
        working-directory: apps/web
        run: npm install
      - name: Build web
        working-directory: apps/web
        run: npm run build
